name: release

# Publishes the gem to RubyGems via Trusted Publishing (OIDC) when a
# vX.Y.Z tag is pushed — no API key stored anywhere. Authorize this repo +
# this workflow at: https://rubygems.org/gems/leakferret -> Trusted Publishers.
#
# To cut a release: bump lib/leakferret/version.rb, commit, then
#   git tag v0.1.5 && git push origin v0.1.5

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Build gem
        run: gem build leakferret.gemspec
      - name: Configure RubyGems credentials (OIDC)
        uses: rubygems/configure-rubygems-credentials@v1.0.0
      - name: Push gem
        run: gem push leakferret-*.gem

name: smoke

# Real end-to-end install + scan on every OS. This downloads the published
# release binary at `gem install` time, so it only passes once
# leakferrethq/leakferret v0.1.0 is public.
on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  install-and-scan:
    name: gem install + scan (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Build and install the gem (downloads the release binary)
        shell: bash
        run: |
          gem build leakferret.gemspec
          gem install --local ./leakferret-*.gem
      - name: Plant a secret and scan with the installed command
        shell: bash
        run: |
          mkdir -p app
          printf "AWS_ACCESS_KEY = 'AKIAQ7W2E3R4T5Y6U7I8'\n" > app/config.rb
          out="$(leakferret scan . || true)"
          echo "$out"
          echo "$out" | grep -q 'aws_access_key' || { echo "::error::gem did not detect the planted secret"; exit 1; }
